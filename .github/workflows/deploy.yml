# Deploy Workflow\n\nname: Deploy Workflow\n\non: [push]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Build\n        run: npm install && npm run build\n\n      - name: Deploy\n        run: npm run deploy  # Ensure this runs from the root directory (./)\n        env:\n          NODE_ENV: production\n\n